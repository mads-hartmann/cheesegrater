services:
  affineur:
    name: affineur
    description: Runs affineur with fake data for local development.
    commands:
      start: |
        cd tools/affineur
        ona environment port open --name affineur --dont-wait 8080
        # watchexec watches the OCaml SOURCE dirs and owns the build+run: on any
        # save it rebuilds (@all covers the native exe and the js_of_ocaml
        # frontend) and restarts the server (-r). Watching source rather than the
        # built exe avoids the rebuild race where the binary is briefly unlinked.
        # _build is gitignored, so watchexec never loops on its own output.
        nix develop .#affineur --command bash -c '
          exec watchexec -r -w bin -w lib -w web --debounce 500ms -- \
            "dune build @all && AFFINEUR_DATA_SOURCE=fake PORT=8080 JS_PATH=_build/default/web/main.bc.js exec _build/default/bin/main.exe"
        '
      ready: curl -sf http://localhost:8080/health
  mdq:
    name: mdq
    description: Runs mdq serving the repo's docs folder for local development.
    commands:
      start: |
        cd tools/mdq
        ona environment port open --name mdq --dont-wait 8081
        # Markdown content is read from disk per request, so editing docs only
        # needs a browser refresh (no rebuild). watchexec handles OCaml CODE
        # changes: it watches the source dirs and owns the build+run, rebuilding
        # and restarting the server (-r) on save. Watching source rather than the
        # built exe avoids the rebuild race where the binary is briefly unlinked.
        # _build is gitignored, so watchexec never loops on its own output.
        nix develop .#mdq --command bash -c '
          exec watchexec -r -w bin -w lib --debounce 500ms -- \
            "dune build bin/main.exe && PORT=8081 exec _build/default/bin/main.exe ../../docs"
        '
      ready: curl -sf http://localhost:8081/health

tasks:
  warm-up-store:
    name: Warm up Nix store
    description: Builds all flake packages and runs the flake check to populate the Nix store (CI-equivalent build).
    command: |
      nix flake check
      nix build .#affineur .#mdq
    triggeredBy:
      - prebuild
      - manual

  install-pre-commit-hook:
    name: Install pre-commit hook
    description: Locks the git-hooks.nix flake input and installs the pre-commit hook via nix develop.
    command: |
      nix flake update git-hooks
      nix develop --command true
    triggeredBy:
      - postDevcontainerStart
