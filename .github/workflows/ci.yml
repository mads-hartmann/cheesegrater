name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-check-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-check-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-check-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - run: nix flake check

  build-affineur:
    name: build affineur
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-affineur-${{ runner.os }}-${{ hashFiles('flake.lock', 'tools/affineur/**') }}
          restore-prefixes-first-match: nix-affineur-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-affineur-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - run: nix build .#affineur
